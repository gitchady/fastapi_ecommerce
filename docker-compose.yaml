services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce_user} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT:-8000}"
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-ecommerce_db}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8000}:${APP_PORT:-8000}"
    volumes:
      - ./.env:/home/fast/.env:ro
      - ./media:/home/fast/media

volumes:
  postgres_data:
