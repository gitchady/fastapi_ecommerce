name: fastapi-ecommerce-prod
services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce_user} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./app/Dockerfile.prod
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
      gunicorn app.main:app --workers ${GUNICORN_WORKERS:-4} --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:${APP_PORT:-8000}"
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-ecommerce_db}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "${APP_PORT:-8000}"
    volumes:
      - ./.env:/home/fast/.env:ro
      - media_data:/home/fast/media

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    environment:
      APP_PORT: ${APP_PORT:-8000}
      APP_UPSTREAM_HOST: ${APP_UPSTREAM_HOST:-web}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-20m}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-iliham.at.by}
      NGINX_CERT_CHECK_INTERVAL: ${NGINX_CERT_CHECK_INTERVAL:-300}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - media_data:/var/www/media:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt_data:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-}
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-iliham.at.by}
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c "test -n \"$$CERTBOT_EMAIL\" &&
      certbot certonly --webroot -w /var/www/certbot
      --email \"$$CERTBOT_EMAIL\"
      --agree-tos
      --no-eff-email
      --keep-until-expiring
      -d \"$$NGINX_SERVER_NAME\""

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      - nginx
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt
    entrypoint: /bin/sh
    command: >
      -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 43200 & wait $$!;
      done"

volumes:
  postgres_data:
  media_data:
  certbot_webroot:
  letsencrypt_data:
