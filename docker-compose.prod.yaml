name: fastapi-ecommerce-prod
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce_user} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./app/Dockerfile.prod
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
      gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ecommerce_user}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-ecommerce_db}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./.env:/home/fast/.env:ro
      - media_data:/home/fast/media

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - media_data:/var/www/media:ro

volumes:
  postgres_data:
  media_data:
